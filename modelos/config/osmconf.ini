# osmconf.ini — GDAL OSM driver configuration for FdI regional data
[general]
report_all_tags=no
attribute_name_laundering=yes
# Treat closed ways with these tags as polygons (appears in multipolygons layer)
# Key MUST be closed_ways_are_polygons (not "as") — GDAL 3.x silently ignores wrong key
closed_ways_are_polygons=building,landuse,natural,water,amenity,leisure,aeroway

[points]
osm_id=no
osm_type=no
# Field order matches the original layer schema so QGIS field-index caches stay valid.
# Power infrastructure fields appended after POI fields (power_poles layer uses this section).
attributes=place,source:population,population:date,population,official_name,name,capital,alt_name,natural,ele,amenity,historic,related_law,power,voltage,height,operator,ref,substation,material,phases,frequency,transformer,converter,switch

[lines]
osm_id=no
osm_type=no
attributes=highway,name,ref,surface,lanes,oneway,maxspeed,junction,bridge,tunnel,lit,service,tracktype,smoothness,foot,bicycle,layer,width,access,motor_vehicle,destination,int_ref,nat_ref,reg_ref,power,voltage,circuits,cables,wires,phases,frequency,operator,location,line

[multipolygons]
osm_id=no
osm_type=no
attributes=building,amenity,name,religion,denomination,historic,heritage,operator,ref,layer,wikipedia,website,source,alt_name,type,fee,ele,barrier,ruins,disused,landuse,natural,water

[multilinestrings]
osm_id=no
osm_type=no
attributes=highway,name,ref,surface

[other_relations]
osm_id=no
osm_type=no
attributes=type,name,ref
